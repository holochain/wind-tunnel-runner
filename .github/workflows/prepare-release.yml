name: prepare-release.yml

on:
  push:
    branches: [main, "feat/19-use-a-long-lasting-tailscale-token-for-new-nodes-to-join-the-tailnet"]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate tailscale API key
        id: generate_api_key
        run: |
          API_KEY=$(curl \
            -d "client_id=${{ secrets.TS_OAUTH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TS_OAUTH_SECRET }}" \
            "https://api.tailscale.com/api/v2/oauth/token" \
            | jq .access_token)
          echo "api_key=$API_KEY"
          echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Generate tailscale auth key
        run: |
          AUTH_KEY=$(curl \
            'https://api.tailscale.com/api/v2/tailnet/-/keys' \
            --request POST \
            --header 'Content-Type: application/json' \
            --header 'Authorization: Bearer ${{ steps.generate_api_key.outputs.api_key }}' \
            --data '{
              "description": "Nomad client access from installer ISO",
              "capabilities": {
                "devices": {
                  "create": {
                    "reusable": true,
                    "ephemeral": false,
                    "preauthorized": false,
                    "tags": [
                      "tag:nomad-client"
                    ]
                  }
                }
              },
              "expirySeconds": 86400,
              "scopes": [
                "auth_keys:write"
              ],
              "tags": [
                "tag:ci"
              ]
            }' | jq .key)
          echo "auth_key=$AUTH_KEY"
